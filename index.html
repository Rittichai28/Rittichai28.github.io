    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 Column with Image Zoom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card-img-top {
            height: 200px;
            object-fit: cover; /* ให้รูปตัดพอดีกรอบ ไม่เบี้ยว */
            cursor: pointer;
        }
        .card {
            transition: transform 0.2s;
            height: 100%;
        }
        .card:hover {
            transform: translateY(-5px); /* เอฟเฟกต์ลอยขึ้นเล็กน้อย */
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="container mt-5">
<!--Modals-->
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card">
                <img src="IMG/img1.JPG" class="card-img-top" alt="Image 1">
                <div class="card-body text-center">
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#imageModal1">ขยายรูป</button>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card">
                <img src="IMG/img2.JPG" class="card-img-top" alt="Image 2">
                <div class="card-body text-center">
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#imageModal2">ขยายรูป</button>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card">
                <img src="IMG/img3.JPG" class="card-img-top" alt="Image 3">
                <div class="card-body text-center">
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#imageModal3">ขยายรูป</button>
                </div>
            </div>
        </div>
                <div class="col-md-4">
            <div class="card">
                <img src="IMG/img4.JPEG" class="card-img-top" alt="Image 4">
                <div class="card-body text-center">
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#imageModal4">ขยายรูป</button>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card">
                <img src="IMG/img5.JPEG" class="card-img-top" alt="Image 5">
                <div class="card-body text-center">
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#imageModal5">ขยายรูป</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modals for each image -->
<div class="modal fade" id="imageModal1" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-0">
                <img src="IMG/img1.JPG" class="img-fluid w-100" alt="Large View">
                <p class="p-3">© 2023-2026</p>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="imageModal2" tabindex="-1" aria-hidden="true">

</div>
